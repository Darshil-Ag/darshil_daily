name: Daily Commit

on:
  schedule:
    - cron: '0 18 * * *'   # Runs daily at 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "Last update: $(date)" > daily.txt

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add daily.txt
          git commit -m "Daily commit $(date +'%Y-%m-%d')" || exit 0
          git push
